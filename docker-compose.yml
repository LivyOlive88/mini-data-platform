# ---------------------------------------------------------------------------
# Shared Airflow configuration (YAML anchor, not a real service)
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__CORE__REMOTE_LOGGING: "False"
    AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "False"
    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
    AIRFLOW__SMTP__SMTP_PORT: 587
    AIRFLOW__SMTP__SMTP_STARTTLS: "True"
    AIRFLOW__SMTP__SMTP_USER: ${SMTP_MAIL_FROM}
    AIRFLOW__SMTP__SMTP_PASSWORD: ${SMTP_PASSWORD:-YOUR_APP_PASSWORD_HERE}
    AIRFLOW__SMTP__SMTP_MAIL_FROM: ${SMTP_MAIL_FROM}
    _PIP_ADDITIONAL_REQUIREMENTS: "faker minio psycopg2-binary"
    PYTHONPATH: "/opt/airflow:/opt/airflow/src"
    # PostgreSQL
    POSTGRES_HOST: ${POSTGRES_HOST}
    POSTGRES_PORT: ${POSTGRES_PORT}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    # MinIO
    MINIO_ENDPOINT: ${MINIO_ENDPOINT}
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    # SMTP
    SMTP_MAIL_FROM: ${SMTP_MAIL_FROM}
  user: "50000:50000"
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_started
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - ./scripts:/opt/airflow/scripts

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --- PostgreSQL -----------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: postgres_mdp
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mdp_user -d mdp_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio_mdp
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Metabase -------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_mdp
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      - postgres
    volumes:
      - metabase_data:/metabase-data

  # --- Airflow: database migrations -----------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init_mdp
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username ${AIRFLOW_USERNAME} \
          --password ${AIRFLOW_PASSWORD} \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email airflow@example.com || true
    restart: "no"

  # --- Airflow: webserver ---------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver_mdp
    command: airflow webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/ready 2>/dev/null || curl -f http://localhost:8080/health 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  # --- Airflow: scheduler ---------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler_mdp
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  minio_data:
  metabase_data:
