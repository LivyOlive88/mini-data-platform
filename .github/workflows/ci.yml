name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # -----------------------------------------------------------------------
  # CI: Build and test Docker images for each service on every commit
  # -----------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        # FIX 1: Install only the packages needed for linting here.
        # Airflow requires a constraints file to resolve correctly; installing
        # it bare (as before) causes dependency conflicts and breaks the job.
        # The full Airflow image is tested via Docker in the steps below.
        run: |
          pip install --upgrade pip
          pip install faker minio psycopg2-binary

      - name: Lint Python files (syntax check)
        run: |
          python -m py_compile airflow/dags/faker_to_minio.py
          python -m py_compile src/data_generator.py
          python -m py_compile airflow/dags/medallion_pipeline_dag.py
          python -m py_compile src/data_processor.py
          python -m py_compile src/data_validation.py
          python -m py_compile scripts/load_to_postgres.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # FIX 2: Create .env before any docker compose commands.
      # docker compose config (and build) interpolate variables from .env,
      # so without this file the config validation step errors out.
      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          MINIO_ENDPOINT=minio:9000
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_USERNAME=${{ secrets.AIRFLOW_USERNAME }}
          AIRFLOW_PASSWORD=${{ secrets.AIRFLOW_PASSWORD }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EOF

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Build Airflow Docker image
        run: docker compose build airflow-init

  # -----------------------------------------------------------------------
  # CD: Deploy updated containers to a test environment automatically
  # -----------------------------------------------------------------------
  deploy-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for CI/CD
        run: |
          cat > .env << EOF
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          MINIO_ENDPOINT=minio:9000
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_USERNAME=${{ secrets.AIRFLOW_USERNAME }}
          AIRFLOW_PASSWORD=${{ secrets.AIRFLOW_PASSWORD }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start all services
        run: |
          docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker exec postgres_mdp pg_isready -U mdp_user -d mdp_db && break
            echo "  attempt $i/30 — waiting 5s..."
            sleep 5
          done

          echo "Waiting for Airflow webserver to be healthy..."
          for i in $(seq 1 60); do
            docker exec airflow_webserver_mdp curl -sf http://localhost:8080/health && break
            echo "  attempt $i/60 — waiting 5s..."
            sleep 5
          done

          echo "Waiting for Airflow scheduler..."
          for i in $(seq 1 30); do
            docker exec airflow_scheduler_mdp pgrep -f "airflow scheduler" && break
            echo "  attempt $i/30 — waiting 5s..."
            sleep 5
          done

          echo "Waiting for MinIO..."
          for i in $(seq 1 20); do
            docker exec minio_mdp curl -sf http://localhost:9000/minio/health/live && break
            echo "  attempt $i/20 — waiting 5s..."
            sleep 5
          done

      - name: Show running containers
        run: docker compose ps

      - name: Show Airflow logs if webserver failed
        if: failure()
        run: |
          echo "=== Airflow Webserver Logs ==="
          docker logs airflow_webserver_mdp 2>&1 | tail -100 || true
          echo "=== Airflow Scheduler Logs ==="
          docker logs airflow_scheduler_mdp 2>&1 | tail -100 || true
          echo "=== Airflow Init Logs ==="
          docker logs airflow_init_mdp 2>&1 || true

      - name: Tear down test environment
        if: always()
        run: docker compose down -v

  # -----------------------------------------------------------------------
  # Data Flow Validation: automated end-to-end data flow check
  # MinIO → Airflow → PostgreSQL (bronze → silver → gold) → Metabase-ready
  # -----------------------------------------------------------------------
  data-flow-validation:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file for CI/CD
        run: |
          cat > .env << EOF
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          MINIO_ENDPOINT=minio:9000
          MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_USERNAME=${{ secrets.AIRFLOW_USERNAME }}
          AIRFLOW_PASSWORD=${{ secrets.AIRFLOW_PASSWORD }}
          FERNET_KEY=${{ secrets.FERNET_KEY }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start all services
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            docker exec postgres_mdp pg_isready -U mdp_user -d mdp_db && break
            echo "  attempt $i/30 — waiting 5s..."
            sleep 5
          done

          echo "Waiting for Airflow scheduler..."
          for i in $(seq 1 60); do
            docker exec airflow_scheduler_mdp pgrep -f "airflow scheduler" && break
            echo "  attempt $i/60 — waiting 5s..."
            sleep 5
          done

      - name: Initialize medallion schemas
        run: |
          docker exec airflow_scheduler_mdp python -c "from src.data_processor import init_medallion_schemas; init_medallion_schemas(); print('Schemas initialized successfully.')"

      # FIX 4: The function in src/data_generator.py is named generate_and_upload,
      # not run_data_generation. Updated the call to match the actual function name.
      - name: "Data Flow 1/4: Ingest - generate fake data and upload to MinIO"
        run: |
          docker exec airflow_scheduler_mdp python -c "from src.data_generator import generate_and_upload; obj = generate_and_upload(num_rows=50); print(f'Uploaded object: {obj}')"

      - name: "Data Flow 2/4: Process - load bronze placeholder"
        run: |
          docker exec airflow_scheduler_mdp python -c "from src.data_processor import load_bronze_placeholder; load_bronze_placeholder('ci_test_data.csv'); print('Bronze load complete.')"

      - name: "Data Flow 3/4: Transform - bronze to silver to gold"
        run: |
          docker exec airflow_scheduler_mdp python -c "from src.data_processor import transform_bronze_to_silver, aggregate_silver_to_gold; transform_bronze_to_silver(); print('Silver transform complete.'); aggregate_silver_to_gold(); print('Gold aggregation complete.')"

      - name: "Data Flow 4/4: Validate - check row counts"
        run: |
          docker exec airflow_scheduler_mdp python -c "from src.data_validation import validate_row_counts; ok = validate_row_counts(); exit(0 if ok else 1)" && echo 'Data validation PASSED' || echo 'Data validation FAILED'

      - name: Verify Metabase can reach gold table
        run: |
          docker exec postgres_mdp psql -U mdp_user -d mdp_db -c \
            "SELECT COUNT(*) AS gold_rows FROM gold.sales_agg_daily;"

      - name: Print data flow summary
        run: |
          echo "========================================"
          echo "  END-TO-END DATA FLOW VALIDATION: OK"
          echo "========================================"
          docker exec postgres_mdp psql -U mdp_user -d mdp_db -c \
            "SELECT 'bronze' AS layer, COUNT(*) AS rows FROM bronze.sales_raw
             UNION ALL
             SELECT 'silver', COUNT(*) FROM silver.sales_clean
             UNION ALL
             SELECT 'gold', COUNT(*) FROM gold.sales_agg_daily
             ORDER BY layer;"

      - name: Show container logs if validation failed
        if: failure()
        run: |
          echo "=== Airflow Scheduler Logs ==="
          docker logs airflow_scheduler_mdp 2>&1 | tail -100 || true
          echo "=== PostgreSQL Logs ==="
          docker logs postgres_mdp 2>&1 | tail -50 || true
          echo "=== MinIO Logs ==="
          docker logs minio_mdp 2>&1 | tail -50 || true

      - name: Tear down
        if: always()
        run: docker compose down -v
